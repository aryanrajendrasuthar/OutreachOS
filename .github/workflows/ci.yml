name: CI

on:
  pull_request:
    branches: [main, dev]
  push:
    branches: [main]

jobs:
  ci:
    name: Lint · Type · Test · Audit
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Run ESLint (zero warnings)
        run: npm run lint

      - name: Run TypeScript check (tsc --noEmit)
        run: npm run typecheck

      - name: Run Prettier check
        run: npm run format:check

      - name: Run npm audit (fail on high/critical)
        run: npm audit --audit-level=high

      - name: Run TruffleHog (secret scan)
        uses: trufflesecurity/trufflehog@main
        with:
          path: ./
          base: ${{ github.event.repository.default_branch }}
          head: HEAD
          extra_args: --only-verified

      - name: Run unit + integration tests
        run: npm run test
        env:
          NODE_ENV: test
          ENCRYPTION_KEY: ${{ secrets.TEST_ENCRYPTION_KEY }}
          ANTHROPIC_API_KEY: ${{ secrets.TEST_ANTHROPIC_API_KEY }}

      - name: Upload coverage reports
        uses: codecov/codecov-action@v4
        with:
          token: ${{ secrets.CODECOV_TOKEN }}
          directory: ./packages/shared/coverage
